{% extends "base.html" %}

{% block title %}登录 - AI错题本{% endblock %}

{% block content %}
<div class="row">
    <div class="col s12 m6 offset-m3">
        <div class="card z-depth-2">
            <div class="card-content">
                <span class="card-title center-align blue-text text-darken-2">
                    <i class="material-icons">login</i>用户登录
                </span>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="input-field">
                        <i class="material-icons prefix">person</i>
                        <input id="username" name="username" type="text" required>
                        <label for="username">用户名</label>
                    </div>
                    <div class="input-field">
                        <i class="material-icons prefix">lock</i>
                        <input id="password" name="password" type="password" required>
                        <label for="password">密码</label>
                    </div>
                    <div class="center-align" style="margin-top: 30px;">
                        <button type="submit" class="btn blue lighten-1 waves-effect waves-light">
                            <i class="material-icons left">login</i>登录
                        </button>
                    </div>
                    <div class="center-align" style="margin-top: 20px;">
                        <p class="grey-text">
                            还没有账户？<a href="{{ url_for('register') }}" class="blue-text">立即注册</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
